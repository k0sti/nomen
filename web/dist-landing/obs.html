<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Opening in Obsidian...</title>
<script>
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const vault = params.get('vault') || 'vault';
  if (file) {
    const url = 'obsidian://open?vault=' + encodeURIComponent(vault) + '&file=' + encodeURIComponent(file);
    window.location.href = url;
    document.getElementById('link').href = url;
    document.getElementById('link').textContent = file;
  }
</script>
</head><body style="font-family:system-ui;padding:2em;color:#ccc;background:#1a1a2e">
<p>Opening in Obsidian... <a id="link" href="#" style="color:#7dd3fc">Click here</a> if it doesn't open automatically.</p>
</body></html>
