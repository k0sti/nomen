[package]
name = "nomen"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Nostr-native memory system CLI"

[dependencies]
# Nostr
nostr-sdk = "0.39"

# CLI
clap = { version = "4", features = ["derive"] }

# Async
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Crypto
hex = "0.4"

# Time formatting
chrono = "0.4"

# Terminal output
colored = "2"
